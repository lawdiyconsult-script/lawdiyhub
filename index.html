<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawDIYHub - รวมความรู้กฎหมายฟรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-btn.active { background-color: #DE3D12; color: white; border-color: #DE3D12; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">⚖️ LawDIYHub</h1>
        </div>
    </nav>

    <main class="container mx-auto my-8 p-4">
        <div class="max-w-2xl mx-auto mb-10">
            <h2 class="text-3xl font-bold text-center mb-6 text-slate-800">ค้นหาความรู้กฎหมาย</h2>
            <div class="relative">
                <input type="text" id="search-input" onkeyup="filterContent()" placeholder="พิมพ์เรื่องที่สงสัย เช่น มรดก, สัญญา..." 
                       class="w-full p-4 pl-12 rounded-full border-2 border-gray-200 focus:border-orange-500 outline-none shadow-sm transition-all">
                <span class="absolute left-5 top-4">🔍</span>
            </div>
        </div>

        <div class="flex justify-center flex-wrap gap-3 mb-10">
            <button onclick="switchTab('long')" id="btn-long" class="tab-btn active px-6 py-2.5 rounded-full font-bold border transition-all">📺 วิดีโอความรู้</button>
            <button onclick="switchTab('short')" id="btn-short" class="tab-btn px-6 py-2.5 rounded-full font-bold border bg-white text-gray-600 transition-all">⚡ กฎหมายสั้น (Shorts)</button>
            <button onclick="switchTab('file')" id="btn-file" class="tab-btn px-6 py-2.5 rounded-full font-bold border bg-white text-gray-600 transition-all">📂 แบบฟอร์ม/เอกสาร</button>
        </div>

        <section id="content-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400 animate-pulse">กำลังดึงข้อมูลล่าสุด...</div>
        </section>
    </main>

    <script>
        let currentTab = 'long';
        let rawData = { long_videos: [], shorts: [], folders: [] };

        async function loadContent() {
            try {
                // ดึงข้อมูลและใส่ Date.now() เพื่อป้องกันการจำค่าเก่า (Cache)
                const response = await fetch('./data.json?v=' + Date.now());
                rawData = await response.json();
                
                // เริ่มต้นแสดงผลที่หน้า วิดีโอความรู้
                switchTab('long');
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('content-grid').innerHTML = 
                    `<div class="col-span-full text-center py-10 text-red-500">ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่อีกครั้ง</div>`;
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // เปลี่ยนสีปุ่มเมนู (ถ้าคุณมี Class tab-btn ใน HTML)
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-orange-600', 'text-white');
                btn.classList.add('bg-white', 'text-gray-600');
            });
            
            const activeBtn = document.getElementById('btn-' + tab);
            if (activeBtn) {
                activeBtn.classList.remove('bg-white', 'text-gray-600');
                activeBtn.classList.add('bg-orange-600', 'text-white');
            }

            renderGallery();
        }

        function renderGallery() {
            const grid = document.getElementById('content-grid');
            let items = [];

            // เลือกชุดข้อมูลตาม Tab ที่กด
            if (currentTab === 'long') items = rawData.long_videos || [];
            else if (currentTab === 'short') items = rawData.shorts || [];
            else items = rawData.folders || [];

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">ยังไม่มีข้อมูลในส่วนนี้</div>`;
                return;
            }

            // แสดงผลตามประเภท (วิดีโอ หรือ ไฟล์/โฟลเดอร์)
            if (currentTab === 'file') {
                grid.innerHTML = items.map(f => `
                    <a href="${f.webViewLink}" target="_blank" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:border-orange-500 hover:shadow-md transition-all text-center group">
                        <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">${f.mimeType.includes('folder') ? '📂' : '📝'}</div>
                        <div class="font-bold text-gray-800 text-sm line-clamp-2 uppercase">${f.name}</div>
                    </a>
                `).join('');
            } else {
                grid.innerHTML = items.map(v => `
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-xl transition-all flex flex-col">
                        <img src="${v.thumbnail}" class="w-full ${currentTab==='short'?'h-72':'h-36'} object-cover">
                        <div class="p-4 flex-1 flex flex-col">
                            <h3 class="font-bold text-sm mb-4 line-clamp-2 h-10 text-slate-800 leading-snug">${v.title}</h3>
                            <a href="${v.videoUrl}" target="_blank" class="w-full py-2 bg-orange-50 text-orange-600 rounded-xl text-center text-xs font-bold hover:bg-orange-600 hover:text-white transition-all">
                                ▶ ชมวิดีโอ
                            </a>
                        </div>
                    </div>
                `).join('');
            }
        }

        // เริ่มโหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = loadContent;
    </script>
</body>
</html>
