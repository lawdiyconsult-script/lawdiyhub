    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-legal-serif font-bold text-law-orange mb-8 border-b-2 border-law-orange pb-2 inline-block">คลังความรู้กฎหมาย</h1>
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        async function loadContent() {
            try {
                // ดึงข้อมูลจาก data.json พร้อมเติม timestamp กัน cache
                const response = await fetch('data.json?v=' + new Date().getTime());
                const data = await response.json();
                const grid = document.getElementById('content-grid');
                
                if (!data || data.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-10 text-gray-500">ยังไม่พบข้อมูลวิดีโอ</p>';
                    return;
                }

                grid.innerHTML = data.map(item => `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow border-t-4 border-law-orange">
                        <img src="${item.thumbnail}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <h2 class="font-legal-serif font-bold text-xl mb-3 text-gray-800 h-14 overflow-hidden">${item.title}</h2>
                            <p class="text-thai-sans text-gray-600 text-sm mb-4 h-20 overflow-hidden line-clamp-3">${item.summary || 'กำลังสรุปเนื้อหา...'}</p>
                            <div class="flex justify-between items-center border-t pt-4">
                                <a href="${item.videoUrl}" target="_blank" class="text-law-orange font-bold hover:underline">📺 ชมวิดีโอ</a>
                                <button class="bg-gray-100 text-gray-700 px-3 py-1 rounded text-sm font-semibold hover:bg-law-orange hover:text-white transition">📂 ดาวน์โหลด</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Error:", error);
            }
        }
        // สั่งทำงานทันทีที่โหลดหน้าเว็บ
        window.addEventListener('load', loadContent);
    </script>
