<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawDIYHub - รวมความรู้กฎหมายฟรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold">⚖️ LawDIYHub</h1>
        </div>
    </nav>

    <main class="container mx-auto my-8 p-4">
        <section id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="animate-pulse bg-white p-4 rounded-lg shadow">กำลังโหลดข้อมูล...</div>
        </section>
    </main>

    <script>
        async function loadContent() {
            const response = await fetch('./data.json');
            const data = await response.json();
            const grid = document.getElementById('content-grid');
            grid.innerHTML = data.map(item => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
                    <img src="${item.thumbnail}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <h2 class="font-bold text-lg mb-2">${item.title}</h2>
                        <p class="text-gray-600 text-sm mb-4">${item.summary.substring(0, 150)}...</p>
                        <div class="flex justify-between items-center">
                            <a href="${item.videoUrl}" target="_blank" class="text-blue-600 font-semibold">ชมวิดีโอ</a>
                            <a href="${item.driveLink}" class="bg-green-500 text-white px-3 py-1 rounded text-sm">ดาวน์โหลดไฟล์</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        loadContent();
    </script>
</body>
</html>
