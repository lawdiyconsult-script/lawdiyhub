<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawDIYHub - ศูนย์รวมความรู้กฎหมาย</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'law-orange': '#DE3D12' },
                    fontFamily: { 'serif': ['Playfair Display', 'serif'], 'thai': ['Sarabun', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-thai text-gray-900">
    <nav class="bg-law-orange text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex items-center gap-3">
            <span class="text-2xl">⚖</span>
            <h1 class="text-xl font-bold font-serif">LawDIYHub</h1>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <header class="text-center py-10 mb-8 bg-white rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-3xl font-serif font-bold text-gray-800 mb-2">คลังความรู้กฎหมาย DIY</h2>
            <p class="text-gray-500">รวบรวมวิดีโอและไฟล์ดาวน์โหลดเพื่อประชาชน</p>
        </header>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-gray-400">กำลังโหลดข้อมูล...</div>
        </div>
    </main>

    <script>
        async function loadContent() {
            const grid = document.getElementById('content-grid');
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-20">ไม่พบข้อมูลวิดีโอ</p>';
                    return;
                }

                grid.innerHTML = data.map(item => `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden border-b-4 border-law-orange hover:shadow-xl transition-shadow">
                        <img src="${item.thumbnail}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <h3 class="font-bold text-lg mb-3 leading-tight h-14 overflow-hidden">${item.title}</h3>
                            <p class="text-gray-600 text-sm mb-4 line-clamp-3 h-20">${item.summary || 'สรุปเนื้อหาจากวิดีโอ...'}</p>
                            <div class="flex justify-between items-center pt-4 border-t">
                                <a href="${item.videoUrl}" target="_blank" class="text-law-orange font-bold hover:underline">ชมวิดีโอ</a>
                                <button class="bg-gray-100 text-gray-700 px-3 py-1 rounded text-sm font-semibold hover:bg-law-orange hover:text-white transition">📂 ไฟล์แนบ</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Load error:", error);
                grid.innerHTML = '<p class="col-span-full text-center text-red-500">เกิดข้อผิดพลาดในการโหลดไฟล์ข้อมูล</p>';
            }
        }
        window.onload = loadContent;
    </script>
</body>
</html>
