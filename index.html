<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LawDIYHub - ศูนย์รวมความรู้กฎหมาย</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'law-orange': '#DE3D12' },
                    fontFamily: { 'serif': ['Playfair Display', 'serif'], 'thai': ['Sarabun', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-thai text-gray-900">
    <nav class="bg-law-orange text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">⚖</span>
                <h1 class="text-xl font-bold font-serif">LawDIYHub</h1>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="max-w-xl mx-auto mb-10 text-center">
            <h2 class="text-3xl font-serif font-bold text-gray-800 mb-4">ค้นหาความรู้กฎหมาย</h2>
            <div class="relative">
                <input type="text" id="search-input" onkeyup="filterContent()" 
                    placeholder="พิมพ์เรื่องที่สงสัย เช่น มรดก, สัญญา..." 
                    class="w-full px-5 py-3 pl-12 rounded-full border border-gray-200 shadow-sm focus:ring-2 focus:ring-law-orange outline-none">
                <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
            </div>
        </div>

        <div id="content-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <div class="col-span-full text-center py-20 text-gray-400 animate-pulse">กำลังดึงข้อมูลล่าสุด...</div>
        </div>
    </main>

    <script>
        let allContent = [];

        async function loadContent() {
            const grid = document.getElementById('content-grid');
            try {
                const response = await fetch('data.json?v=' + Date.now());
                allContent = await response.json();
                renderCards(allContent);
            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = '<p class="col-span-full text-center text-red-500">ไม่สามารถโหลดข้อมูลได้</p>';
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('content-grid');
            if (!data || data.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center">ไม่พบรายการ</p>';
                return;
            }
            grid.innerHTML = data.map(item => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden border-b-4 border-law-orange hover:shadow-xl transition-all flex flex-col">
                    <img src="${item.thumbnail}" class="w-full h-40 object-cover">
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="font-bold text-lg mb-2 leading-tight h-14 overflow-hidden">${item.title}</h3>
                        <p class="text-gray-600 text-sm mb-4 line-clamp-3 flex-1">${item.summary || 'สรุปเนื้อหาจากวิดีโอ...'}</p>
                        <div class="flex flex-col gap-2 pt-4 border-t">
                            <a href="${item.videoUrl}" target="_blank" class="text-law-orange font-bold hover:underline flex items-center gap-2">
                                📺 ชมวิดีโอ
                            </a>
                            ${item.downloadUrl ? `
                                <a href="${item.downloadUrl}" target="_blank" class="inline-flex items-center justify-center bg-law-orange text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-700 transition-colors shadow-sm gap-2">
                                    📁 ดาวน์โหลดเอกสาร
                                </a>
                            ` : `
                                <span class="inline-flex items-center justify-center bg-gray-100 text-gray-400 px-4 py-2 rounded-lg text-sm font-bold cursor-not-allowed gap-2">
                                    📂 ไม่มีไฟล์แนบ
                                </span>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterContent() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allContent.filter(item => 
                item.title.toLowerCase().includes(query) || 
                (item.summary && item.summary.toLowerCase().includes(query))
            );
            renderCards(filtered);
        }

        window.onload = loadContent;
    </script>
</body>
</html>
